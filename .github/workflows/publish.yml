name: Publish

env:
  NODE_VERSION: 24

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Archive dist artifacts
        run: tar -cf "${{ runner.temp }}/dist-artifacts.tar" dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          if-no-files-found: error
          path: ${{ runner.temp }}/dist-artifacts.tar

  release:
    name: Bump Versions OR Release to Registry
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm for trusted publishing
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: ${{ runner.temp }}

      - name: Restore dist artifacts
        run: tar -xf "${{ runner.temp }}/dist-artifacts.tar"

      - name: Run Changesets release flow
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          createGithubReleases: false
          title: Publish a new version
          commit: "chore(release): publish a new version"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public
